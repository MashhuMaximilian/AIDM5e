name: Deploy Main To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_PROD_GITHUB || secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || '22' }}
          script: |
            bash /aidm/scripts/deploy_vps.sh /aidm main
